# Workflow: DTensor Unit Test
# Runs unit tests for DTensor (test/distributed/tensor/).
name: dtensor

on:
  push:
    tags:
      - ciflow/dtensor/*
  workflow_call:
  pull_request:
    paths:
      - .github/workflows/dtensor.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  get-label-type:
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    if: github.repository_owner == 'pytorch'
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}

  dtensor-build:
    name: dtensor-build
    uses: ./.github/workflows/_linux-build.yml
    needs: get-label-type
    with:
      runner_prefix: "${{ needs.get-label-type.outputs.label-type }}"
      build-environment: linux-jammy-cuda13.0-py3.10-gcc11
      docker-image-name: ci-image:pytorch-linux-jammy-cuda13.0-cudnn9-py3-gcc11
      cuda-arch-list: '7.5 8.6 8.9'
      test-matrix: |
        { include: [
          { config: "dtensor", shard: 1, num_shards: 1, runner: "${{ needs.get-label-type.outputs.label-type }}linux.g5.12xlarge.nvidia.gpu" },
        ]}
    secrets: inherit

  dtensor-test:
    name: dtensor-test
    uses: ./.github/workflows/_linux-test.yml
    needs: [get-label-type, dtensor-build]
    with:
      build-environment: linux-jammy-cuda13.0-py3.10-gcc11
      docker-image: ci-image:pytorch-linux-jammy-cuda13.0-cudnn9-py3-gcc11
      test-matrix: |
        { include: [
          { config: "dtensor", shard: 1, num_shards: 1, runner: "${{ needs.get-label-type.outputs.label-type }}linux.g5.12xlarge.nvidia.gpu" },
        ]}
    secrets: inherit
