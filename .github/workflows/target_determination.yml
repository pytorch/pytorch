name: target-determination

on:
  workflow_call:

jobs:
  # NB: inner get-label-type was removed (2026-05). Every parent workflow
  # that invokes this reusable workflow already runs runner-determinator at
  # the workflow_run level — the duplicate per-call invocation was redundant
  # and contributed disproportionately to before-test/runner-determinator
  # job overhead. target-determination now runs on a fixed cheap label.
  # Consumers that need TD output already use continue-on-error: true on the
  # td_results download step, so a TD-job failure is non-fatal.
  target-determination:
    # Don't run on forked repos
    if: github.repository_owner == 'pytorch'
    runs-on: linux.2xlarge
    steps:
      - name: Setup Linux
        uses: pytorch/pytorch/.github/actions/setup-linux@main
        with:
          submodules: false

      - name: Get workflow job id
        id: get-job-id
        uses: ./.github/actions/get-workflow-job-id
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pytest cache
        uses: ./.github/actions/pytest-cache-download
        continue-on-error: true
        with:
          cache_dir: .pytest_cache
          job_identifier: ${{ github.workflow }}

      - name: Download LLM Artifacts from S3
        uses: seemethere/download-artifact-s3@1da556a7aa0a088e3153970611f6c432d58e80e6 # v4.2.0
        continue-on-error: true
        with:
          name: llm_results
          path: .additional_ci_files/llm_results

      - name: Do TD
        id: td
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_REF: ${{ github.ref }}
          JOB_ID: ${{ steps.get-job-id.outputs.job-id }}
          JOB_NAME: ${{ steps.get-job-id.outputs.job-name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          unzip -o .additional_ci_files/llm_results/mappings.zip -d .additional_ci_files/llm_results || true
          python3 -m pip install boto3==1.35.42
          python3 tools/testing/do_target_determination_for_s3.py

      - name: Upload TD results to s3
        uses: seemethere/upload-artifact-s3@baba72d0712b404f646cebe0730933554ebce96a # v5.1.0
        if: steps.td.outcome == 'success'
        with:
          name: td_results
          retention-days: 14
          if-no-files-found: error
          path: td_results.json

      - name: Store TD results on GHA
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: steps.td.outcome == 'success'
        with:
          name: td_results.json
          retention-days: 14
          if-no-files-found: error
          path: td_results.json
