name: inductor-micro-benchmark-x86

on:
  schedule:
    - cron: 0 7 * * *
  push:
    tags:
      - ciflow/inductor-micro-benchmark-cpu-x86/*
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch' }}-${{ github.event_name == 'schedule' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  get-label-type:
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    if: ${{ (github.event_name != 'schedule' || github.repository == 'pytorch/pytorch') && github.repository_owner == 'pytorch' }}
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}
      check_experiments: arc,lf

  inductor-build:
    if: ${{ (github.event_name != 'schedule' || github.repository == 'pytorch/pytorch') && github.repository_owner == 'pytorch' }}
    name: inductor-build
    uses: ./.github/workflows/_linux-build.yml
    needs: get-label-type
    with:
      runner_prefix: "${{ needs.get-label-type.outputs.label-type }}"
      build-environment: linux-jammy-py3.10-gcc11
      docker-image-name: ci-image:pytorch-linux-jammy-py3-gcc11-inductor-benchmarks
      ci-docker-hash: ${{ needs.get-label-type.outputs.ci-docker-hash }}
      # Use metal host for benchmark jobs
      test-matrix: |
        { include: [
          { config: "inductor-micro-benchmark-cpu-x86", shard: 1, num_shards: 1, runner: "${{ needs.get-label-type.outputs.label-type }}linux.24xl.spr-metal", owners: ["oncall:pt2"] },
        ]}
      use-arc: ${{ needs.get-label-type.outputs.use-arc == 'true' }}
      python-version: "3.10"
      compiler: gcc11
      cuda-version: cpu
    secrets: inherit

  inductor-micro-benchmark-test:
    name: inductor-micro-benchmark-test
    uses: ./.github/workflows/_linux-test.yml
    needs:
      - inductor-build
      - get-label-type
    with:
      build-environment: ${{ needs.inductor-build.outputs.build-environment }}
      docker-image: ${{ needs.inductor-build.outputs.docker-image }}
      test-matrix: ${{ needs.inductor-build.outputs.test-matrix }}
      test-matrix-osdc: ${{ needs.inductor-build.outputs.test-matrix-osdc }}
      timeout-minutes: 720
      use-arc: ${{ needs.get-label-type.outputs.use-arc == 'true' }}
      python-version: "3.10"
      compiler: gcc11
      cuda-version: cpu
    secrets: inherit
