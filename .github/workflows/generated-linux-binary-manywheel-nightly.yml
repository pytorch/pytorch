      DOCKER_IMAGE: ${{ matrix.docker_image }}
      DOCKER_IMAGE_TAG_PREFIX: ${{ matrix.docker_image_tag_prefix }}
      DESIRED_PYTHON: ${{ matrix.desired_python }}
      build_name: ${{ matrix.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  libtorch-extract:
    name: ${{ matrix.build_name }}-extract
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, manywheel-build]
    runs-on: "${{ needs.get-label-type.outputs.label-type }}linux.4xlarge"
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - desired_cuda: "cpu"
            gpu_arch_type: "cpu"
            gpu_arch_version: ""
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            source_wheel_build_name: "manywheel-py3_10-cpu"
            build_name: "libtorch-cpu-shared-with-deps-release"
          - desired_cuda: "cu126"
            gpu_arch_type: "cuda"
            gpu_arch_version: "12.6"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            source_wheel_build_name: "manywheel-py3_10-cuda12_6"
            build_name: "libtorch-cuda12_6-shared-with-deps-release"
          - desired_cuda: "cu130"
            gpu_arch_type: "cuda"
            gpu_arch_version: "13.0"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            source_wheel_build_name: "manywheel-py3_10-cuda13_0"
            build_name: "libtorch-cuda13_0-shared-with-deps-release"
          - desired_cuda: "cu132"
            gpu_arch_type: "cuda"
            gpu_arch_version: "13.2"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            source_wheel_build_name: "manywheel-py3_10-cuda13_2"
            build_name: "libtorch-cuda13_2-shared-with-deps-release"
          - desired_cuda: "rocm7.1"
            gpu_arch_type: "rocm"
            gpu_arch_version: "7.1"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            source_wheel_build_name: "manywheel-py3_10-rocm7_1"
            build_name: "libtorch-rocm7_1-shared-with-deps-release"
          - desired_cuda: "rocm7.2"
            gpu_arch_type: "rocm"
            gpu_arch_version: "7.2"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            source_wheel_build_name: "manywheel-py3_10-rocm7_2"
            build_name: "libtorch-rocm7_2-shared-with-deps-release"
    env:
      DESIRED_CUDA: ${{ matrix.desired_cuda }}
      LIBTORCH_VARIANT: ${{ matrix.libtorch_variant }}
    steps:
      - name: Checkout PyTorch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          sparse-checkout: .ci/libtorch/
          show-progress: false
      - uses: actions/download-artifact@v4.1.7
        name: Download Wheel Artifact
        with:
          name: ${{ matrix.source_wheel_build_name }}
          path: "${{ runner.temp }}/wheel_artifact/"
      - name: Extract libtorch from wheel
        run: |
          set -eux
          mkdir -p "${{ runner.temp }}/libtorch_output"
          python3 .ci/libtorch/extract_libtorch_from_wheel.py \
            --wheel-dir "${{ runner.temp }}/wheel_artifact" \
            --output-dir "${{ runner.temp }}/libtorch_output" \
            --platform linux \
            --desired-cuda "$DESIRED_CUDA" \
            --libtorch-variant "$LIBTORCH_VARIANT"
      - uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: ${{ matrix.build_name }}
          retention-days: 14
          if-no-files-found: error
          path: "${{ runner.temp }}/libtorch_output/"

  libtorch-upload:
    name: ${{ matrix.build_name }}-upload
    if: ${{ !cancelled() && github.repository_owner == 'pytorch' }}
    permissions:
      id-token: write
      contents: read
    needs: libtorch-extract
    uses: ./.github/workflows/_binary-upload.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - desired_cuda: "cpu"
            gpu_arch_type: "cpu"
            gpu_arch_version: ""
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            build_name: "libtorch-cpu-shared-with-deps-release"
          - desired_cuda: "cu126"
            gpu_arch_type: "cuda"
            gpu_arch_version: "12.6"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            build_name: "libtorch-cuda12_6-shared-with-deps-release"
          - desired_cuda: "cu130"
            gpu_arch_type: "cuda"
            gpu_arch_version: "13.0"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            build_name: "libtorch-cuda13_0-shared-with-deps-release"
          - desired_cuda: "cu132"
            gpu_arch_type: "cuda"
            gpu_arch_version: "13.2"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            build_name: "libtorch-cuda13_2-shared-with-deps-release"
          - desired_cuda: "rocm7.1"
            gpu_arch_type: "rocm"
            gpu_arch_version: "7.1"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            build_name: "libtorch-rocm7_1-shared-with-deps-release"
          - desired_cuda: "rocm7.2"
            gpu_arch_type: "rocm"
            gpu_arch_version: "7.2"
            libtorch_variant: "shared-with-deps"
            libtorch_config: "release"
            build_name: "libtorch-rocm7_2-shared-with-deps-release"
    with:
      PYTORCH_ROOT: /pytorch
      PACKAGE_TYPE: libtorch
      DESIRED_CUDA: ${{ matrix.desired_cuda }}
      GPU_ARCH_VERSION: ${{ matrix.gpu_arch_version }}
      GPU_ARCH_TYPE: ${{ matrix.gpu_arch_type }}
      LIBTORCH_CONFIG: ${{ matrix.libtorch_config }}
      LIBTORCH_VARIANT: ${{ matrix.libtorch_variant }}
      build_name: ${{ matrix.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
