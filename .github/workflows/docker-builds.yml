# Owner(s): ["module: ci"]
name: docker-builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/*
    tags:
      - ciflow/docker/*
    paths:
      - .ci/docker/**
      - .github/workflows/docker-builds.yml
      - .lintrunner.toml
  schedule:
    - cron: 1 3 * * 3

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch' && github.run_id }}-${{ github.event_name == 'schedule' }}
  cancel-in-progress: true

env:
  ECR_REGISTRY: 308535385114.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: pytorch/ci-image
  GHCR_REPOSITORY: ghcr.io/pytorch/ci-image
  AWS_DEFAULT_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  docker-build:
    if: github.repository_owner == 'pytorch'
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.event.ref, 'refs/tags/v')) && 'docker-build' || '' }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        # BuildKit is a *remote* builder running on OSDC; the orchestrator
        # runner just streams context and waits, so the smallest pool fits
        # both amd64 and arm64 builds. Only `buildkit_addr` differs per arch.
        buildkit_addr: ["tcp://buildkitd-amd64.buildkit:1234"]
        docker-image-name: [
          pytorch-linux-jammy-cuda13.0-cudnn9-py3-gcc11,
          pytorch-linux-jammy-cuda13.0-cudnn9-py3.12-gcc11-vllm,
          pytorch-linux-jammy-cuda13.0-cudnn9-py3-gcc11-inductor-benchmarks,
          pytorch-linux-jammy-py3.10-clang18,
          pytorch-linux-jammy-py3.11-clang18,
          pytorch-linux-jammy-py3.12-clang18,
          pytorch-linux-jammy-py3.13-clang18,
          pytorch-linux-jammy-py3.14-clang18,
          pytorch-linux-jammy-py3.14t-clang18,
          pytorch-linux-jammy-rocm-n-py3,
          pytorch-linux-noble-rocm-n-py3,
          pytorch-linux-noble-rocm-nightly-py3,
          pytorch-linux-jammy-rocm-n-py3-benchmarks,
          pytorch-linux-jammy-cuda13.0-cudnn9-py3.10-clang18,
          pytorch-linux-jammy-py3-gcc11-inductor-benchmarks,
          pytorch-linux-jammy-py3.12-halide,
          pytorch-linux-jammy-py3.12-pallas,
          pytorch-linux-jammy-cuda13.0-py3.12-pallas,
          pytorch-linux-jammy-tpu-py3.12-pallas,
          pytorch-linux-jammy-xpu-n-1-py3,
          pytorch-linux-noble-xpu-n-py3,
          pytorch-linux-noble-xpu-n-py3-client,
          pytorch-linux-noble-xpu-n-py3-inductor-benchmarks,
          pytorch-linux-jammy-linter,
          pytorch-linux-jammy-cuda13.0-cudnn9-py3.10-linter,
          # TODO: Re-enable me when docker pin update happens
          # pytorch-linux-jammy-py3-clang18-executorch,
          pytorch-linux-jammy-py3.12-triton-cpu,
          pytorch-linux-noble-riscv64-py3.12-gcc14
        ]
        include:
          - docker-image-name: pytorch-linux-jammy-aarch64-py3.10-gcc13
            buildkit_addr: "tcp://buildkitd-arm64.buildkit:1234"
          - docker-image-name: pytorch-linux-jammy-aarch64-py3.10-gcc13-inductor-benchmarks
            buildkit_addr: "tcp://buildkitd-arm64.buildkit:1234"
            timeout-minutes: 600
    # Use the release runner pool: its nodes carry osdc.io/runner-class=release,
    # which exempts them from the cache-enforcer DaemonSet's iptables block on
    # outbound ghcr.io traffic so the "Mirror image to GHCR" step can succeed.
    # The regular mt-l-* pool blocks ghcr.io egress at the host iptables layer.
    runs-on:
      group: release-runners
      labels: mt-rel-l-x86iavx512-8-64
    container:
      image: ghcr.io/actions/actions-runner:latest
    steps:
      - name: Setup Linux
        uses: pytorch/pytorch/.github/actions/setup-linux@main
        with:
          use-arc: true
          submodules: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ECR
        uses: pytorch/pytorch/.github/actions/ecr-login@main
        with:
          aws-role-to-assume: arn:aws:iam::308535385114:role/arc

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref_type == 'branch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: pytorch
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx (remote)
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: ${{ matrix.buildkit_addr }}

      - name: Compute image tag
        id: tag
        shell: bash
        run: |
          set -ex
          DOCKER_TAG=$(git rev-parse HEAD:.ci/docker)
          DOCKER_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ matrix.docker-image-name }}-${DOCKER_TAG}"
          echo "docker-tag=${DOCKER_TAG}" >> "${GITHUB_OUTPUT}"
          echo "docker-image=${DOCKER_IMAGE}" >> "${GITHUB_OUTPUT}"

      - name: Build and push to ECR
        env:
          REMOTE_BUILDKIT: "1"
          CI: "1"
          DOCKER_IMAGE: ${{ steps.tag.outputs.docker-image }}
        shell: bash
        working-directory: .ci/docker
        run: |
          set -ex
          ./build.sh "${{ matrix.docker-image-name }}" -t "${DOCKER_IMAGE}"

      - name: Mirror image to GHCR
        if: github.event_name == 'push' && github.ref_type == 'branch'
        env:
          ECR_DOCKER_IMAGE: ${{ steps.tag.outputs.docker-image }}
          DOCKER_TAG: ${{ steps.tag.outputs.docker-tag }}
        shell: bash
        run: |
          set -ex
          # `buildx imagetools create` does a server-side cross-registry copy,
          # so we don't need a local pull/push round-trip.
          docker buildx imagetools create \
            -t "${GHCR_REPOSITORY}:${{ matrix.docker-image-name }}-${DOCKER_TAG}" \
            -t "${GHCR_REPOSITORY}:${{ matrix.docker-image-name }}" \
            "${ECR_DOCKER_IMAGE}"

      - name: Generate output
        if: contains(matrix.docker-image-name, 'rocm')
        run: |
          docker_image_name="${{ matrix.docker-image-name }}"
          docker_image_tag="${{ steps.tag.outputs.docker-image }}"
          echo "${docker_image_name}=${docker_image_tag}" >> "docker-builds-output-${docker_image_name}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.4.0
        if: contains(matrix.docker-image-name, 'rocm')
        with:
          name: docker-builds-artifacts-${{ matrix.docker-image-name }}
          retention-days: 14
          path: ./docker-builds-output-${{ matrix.docker-image-name }}.txt
