      GPU_ARCH_TYPE: cpu
      SKIP_ALL_TESTS: 1
      DESIRED_PYTHONS: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t"
      PYTORCH_EXTRA_INSTALL_REQUIREMENTS: cuda-toolkit[nvrtc,cudart,cupti,cufft,curand,cusolver,cusparse,cufile,nvjitlink,nvtx]==13.0.2; platform_system == 'Linux' | nvidia-cublas>=13.1.0.3,<=13.1.1.3; platform_system == 'Linux' | cuda-bindings>=13.0.3,<14; platform_system == 'Linux' | nvidia-cudnn-cu13==9.20.0.48; platform_system == 'Linux' | nvidia-cusparselt-cu13==0.8.1; platform_system == 'Linux' | nvidia-nccl-cu13==2.30.4; platform_system == 'Linux' | nvidia-nvshmem-cu13==3.4.5; platform_system == 'Linux'
    steps:
      # BINARY_ENV_FILE needs ${RUNNER_TEMP} so it has to be populated in-step
      # rather than at the workflow env level.
      - name: Populate runner env
        shell: bash
        run: |
          echo "BINARY_ENV_FILE=${RUNNER_TEMP}/env" >> "${GITHUB_ENV}"
      - name: Checkout PyTorch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
          show-progress: false
      - name: Clean PyTorch checkout
        run: |
          # Remove any artifacts from the previous checkouts
          git clean -fxd
      - name: Install libomp
        run: |
          "${PYTORCH_ROOT}/.ci/wheel/install_libomp.sh"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # enable-cache persists ~/.cache/uv across nightlies (keyed on the
          # workflow file hash by default); a warm cache makes the subsequent
          # `uv python install` a no-op.
          enable-cache: true
      - name: Pre-fetch all CPython versions
        # One command, parallel downloads of everything in DESIRED_PYTHONS.
        # Cached under ~/.local/share/uv/python/; the build script's per-
        # iteration `uv python install <ver>` becomes a cache hit.
        run: uv python install $DESIRED_PYTHONS
      - name: Build all wheels
        run: |
          "${PYTORCH_ROOT}/.ci/wheel/build_all_macos_wheels.sh"
      - name: Delocate all wheels
        run: |
          "${PYTORCH_ROOT}/.ci/wheel/delocate_wheels.sh"
      # Upload phase: each wheel becomes its own artifact (one call per name).
      - name: Upload wheel-py3_10-cpu
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: wheel-py3_10-cpu
          retention-days: 14
          if-no-files-found: error
          path: ${{ runner.temp }}/artifacts/wheel-py3_10-cpu
      - name: Upload wheel-py3_11-cpu
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: wheel-py3_11-cpu
          retention-days: 14
          if-no-files-found: error
          path: ${{ runner.temp }}/artifacts/wheel-py3_11-cpu
      - name: Upload wheel-py3_12-cpu
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: wheel-py3_12-cpu
          retention-days: 14
          if-no-files-found: error
          path: ${{ runner.temp }}/artifacts/wheel-py3_12-cpu
      - name: Upload wheel-py3_13-cpu
        uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
