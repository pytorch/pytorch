name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude-code:
    uses: pytorch/test-infra/.github/workflows/_claude-code.yml@cf2afb424dc37011b7d3c9d81fa23387148d9d41 # main
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    secrets: inherit
    with:
      additional_claude_args: '--allowedTools Skill'
