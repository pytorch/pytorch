name: periodic-rocm-mi355

on:
  schedule:
    # Reduced from every-3-hours (8x/day) to twice-daily (2026-05) — see
    # periodic-rocm-mi300.yml for rationale. MI355 uses H100/MI355 OSDC
    # capacity-block runners (us-east-2).
    - cron: 0 0,12 * * * # twice daily (00:00 / 12:00 UTC)
    - cron: 29 8 * * *  # about 1:29am PDT, for mem leak check and rerun disabled tests
  push:
    tags:
      - ciflow/periodic-rocm-mi355/*
    branches:
      - release/*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch' && github.run_id }}-${{ github.event_name == 'schedule' }}-${{ github.event.schedule }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # llm-td removed for periodic-rocm-mi355 (2026-05): see trunk.yml note.
  target-determination:
    name: before-test
    uses: ./.github/workflows/target_determination.yml

  get-label-type:
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    if: (github.event_name != 'schedule' || github.repository == 'pytorch/pytorch') && github.repository_owner == 'pytorch'
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}

  linux-noble-rocm-py3_12-build:
    name: linux-noble-rocm-py3.12-mi355
    uses: ./.github/workflows/_linux-build.yml
    needs: get-label-type
    with:
      runner_prefix: "${{ needs.get-label-type.outputs.label-type }}"
      build-environment: linux-noble-rocm-py3.12-mi355
      docker-image-name: ci-image:pytorch-linux-noble-rocm-n-py3
      test-matrix: |
        { include: [
          { config: "distributed", shard: 1, num_shards: 3, runner: "linux.rocm.gpu.gfx950.4", owners: ["module:rocm", "oncall:distributed"] },
          { config: "distributed", shard: 2, num_shards: 3, runner: "linux.rocm.gpu.gfx950.4", owners: ["module:rocm", "oncall:distributed"] },
          { config: "distributed", shard: 3, num_shards: 3, runner: "linux.rocm.gpu.gfx950.4", owners: ["module:rocm", "oncall:distributed"] },
        ]}
    secrets: inherit

  linux-noble-rocm-py3_12-test:
    name: linux-noble-rocm-py3.12-mi355
    uses: ./.github/workflows/_rocm-test.yml
    needs:
      - linux-noble-rocm-py3_12-build
      - target-determination
    with:
      build-environment: ${{ needs.linux-noble-rocm-py3_12-build.outputs.build-environment }}
      docker-image: ${{ needs.linux-noble-rocm-py3_12-build.outputs.docker-image }}
      test-matrix: ${{ needs.linux-noble-rocm-py3_12-build.outputs.test-matrix }}
    secrets: inherit
