name: linux-binary-test-rocm

# Reusable workflow that runs the ROCm binary test (setup-rocm, GPU device
# passthrough, ECR docker pull, test-pytorch-binary, teardown-rocm). Called
# from the matrix-driven manywheel-test-rocm job in
# generated-linux-binary-manywheel-nightly.yml.

on:
  workflow_call:
    inputs:
      build_name:
        required: true
        type: string
      PYTORCH_ROOT:
        required: true
        type: string
      PACKAGE_TYPE:
        required: true
        type: string
      DESIRED_CUDA:
        required: true
        type: string
      GPU_ARCH_VERSION:
        required: true
        type: string
      GPU_ARCH_TYPE:
        required: true
        type: string
      DOCKER_IMAGE:
        required: true
        type: string
      DOCKER_IMAGE_TAG_PREFIX:
        required: true
        type: string
      DESIRED_PYTHON:
        required: false
        type: string
      runs_on:
        required: false
        type: string
        default: linux.rocm.gpu.gfx942.1
      timeout-minutes:
        required: false
        type: number
        default: 240

permissions:
  id-token: write
  contents: read

jobs:
  # ROCm test runs the test container via the GHA `container:` directive.
  # ROCm device passthrough flags go through container.options. Same shape
  # as the standard _binary-test-linux.yml.
  test:
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    container:
      image: pytorch/${{ inputs.DOCKER_IMAGE }}:${{ inputs.DOCKER_IMAGE_TAG_PREFIX }}
      options: --device=/dev/mem --device=/dev/kfd --device=/dev/dri --group-add video --group-add daemon
    env:
      PYTORCH_ROOT: ${{ github.workspace }}
      PACKAGE_TYPE: ${{ inputs.PACKAGE_TYPE }}
      DESIRED_CUDA: ${{ inputs.DESIRED_CUDA }}
      GPU_ARCH_VERSION: ${{ inputs.GPU_ARCH_VERSION }}
      GPU_ARCH_TYPE: ${{ inputs.GPU_ARCH_TYPE }}
      SKIP_ALL_TESTS: 1
      DESIRED_PYTHON: ${{ inputs.DESIRED_PYTHON }}
      ALPINE_IMAGE: "308535385114.dkr.ecr.us-east-1.amazonaws.com/tool/alpine"
      AWS_DEFAULT_REGION: us-east-1
      BINARY_ENV_FILE: /tmp/env
      BUILD_ENVIRONMENT: linux-binary-manywheel
      SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GPU_FLAG: "--device=/dev/mem --device=/dev/kfd --device=/dev/dri --group-add video --group-add daemon"
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout PyTorch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
          show-progress: false

      - uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        name: Download Build Artifacts
        with:
          name: ${{ inputs.build_name }}
          path: "${{ runner.temp }}/artifacts/"

      - name: Make test env permanent
        shell: bash
        run: |
          mkdir -p "$(dirname "$BINARY_ENV_FILE")"
          PYTORCH_FINAL_PACKAGE_DIR="${RUNNER_TEMP}/artifacts"
          {
            echo "PYTORCH_ROOT=${PYTORCH_ROOT}"
            echo "PACKAGE_TYPE=${PACKAGE_TYPE}"
            echo "DESIRED_CUDA=${DESIRED_CUDA}"
            echo "GPU_ARCH_VERSION=${GPU_ARCH_VERSION}"
            echo "GPU_ARCH_TYPE=${GPU_ARCH_TYPE}"
            echo "DOCKER_IMAGE=pytorch/${{ inputs.DOCKER_IMAGE }}:${{ inputs.DOCKER_IMAGE_TAG_PREFIX }}"
            echo "SKIP_ALL_TESTS=${SKIP_ALL_TESTS}"
            echo "DESIRED_PYTHON=${DESIRED_PYTHON}"
            echo "ALPINE_IMAGE=${ALPINE_IMAGE}"
            echo "AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}"
            echo "BINARY_ENV_FILE=${BINARY_ENV_FILE}"
            echo "BUILD_ENVIRONMENT=${BUILD_ENVIRONMENT}"
            echo "BUILD_NAME=${{ inputs.build_name }}"
            echo "PR_NUMBER=${PR_NUMBER}"
            echo "PYTORCH_FINAL_PACKAGE_DIR=${PYTORCH_FINAL_PACKAGE_DIR}"
            echo "SHA1=${SHA1}"
          } >> "${GITHUB_ENV}"

      - name: Populate binary env
        shell: bash
        run: bash .ci/pytorch/binary_populate_env.sh

      - name: Test PyTorch binary
        shell: bash
        env:
          OUTPUT_SCRIPT: /run.sh
        run: |
          ln -sf "${GITHUB_WORKSPACE}" /pytorch
          ln -sf "${PYTORCH_FINAL_PACKAGE_DIR}" /final_pkgs
          bash .ci/pytorch/binary_linux_test.sh
          source "${BINARY_ENV_FILE}"
          bash -x /run.sh
