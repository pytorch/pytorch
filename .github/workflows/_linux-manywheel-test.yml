name: linux-manywheel-test

on:
  workflow_call:
    inputs:
      python-versions:
        required: true
        type: string
        description: JSON array of python version objects [{tag, abi, version}]
      test-configs:
        required: true
        type: string
        description: JSON array of GPU test config objects

permissions:
  id-token: write

env:
  PYTORCH_ROOT: /pytorch
  PYTORCH_FINAL_PACKAGE_DIR: /artifacts

jobs:
  test:
    if: github.repository_owner == 'pytorch'
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        python_version: ${{ fromJSON(inputs.python-versions) }}
        gpu_config: ${{ fromJSON(inputs.test-configs) }}

    runs-on: ${{ matrix.gpu_config.runs_on }}
    container:
      image: ${{ matrix.gpu_config.container_image }}
      options: ${{ matrix.gpu_config.gpu_arch_type == 'cuda' && '--gpus all -e NVIDIA_DRIVER_CAPABILITIES=compute,utility,video' || ' ' }}

    steps:
      - name: Checkout PyTorch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
          show-progress: false

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download wheel
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: wheels-${{ matrix.gpu_config.name }}-${{ matrix.python_version.abi }}
          path: artifacts/

      - name: Test wheel
        env:
          DESIRED_CUDA: ${{ matrix.gpu_config.desired_cuda }}
          PYTORCH_BUILD_NUMBER: 1
        run: |
          set -eux
          export PATH="/opt/python/${{ matrix.python_version.tag }}/bin:$PATH"

          export PYTORCH_BUILD_VERSION=$(basename artifacts/*.whl | sed 's/^torch-//;s/-.*//')

          pip install artifacts/*.whl \
            --index-url "https://download.pytorch.org/whl/nightly/${DESIRED_CUDA}" -v
          export OMP_NUM_THREADS=4

          LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}:/usr/local/nvidia/lib64" \
            .ci/pytorch/run_tests.sh manywheel ${{ matrix.python_version.version }} ${{ matrix.gpu_config.desired_cuda }}
