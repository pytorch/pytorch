name: Setup Linux

description: Set up Linux workspace on EC2 or OSDC ARC runners

inputs:
  use-arc:
    description: Whether the runner is an OSDC ARC runner (returned by runner_determinator)
    required: false
    default: ''
  python-version:
    description: Python version to install (e.g. "3.12"). Empty string keeps the default.
    required: false
    default: ''
  compiler:
    description: Compiler name and version (e.g. "gcc11", "clang15"). Empty string keeps the base image default.
    required: false
    default: ''
  cuda-version:
    description: CUDA version to activate (e.g. "13.0"). Empty string keeps the default.
    required: false
    default: ''
  submodules:
    description: Submodule checkout mode passed to checkout-pytorch (default "recursive", use "false" for test jobs).
    required: false
    default: 'recursive'
  github-token:
    description: GITHUB_TOKEN, needed to retrieve the workflow job id.
    required: false
    default: ''

outputs:
  branch:
    description: Parsed branch name from GITHUB_REF
    value: ${{ steps.parse-ref.outputs.branch }}
  tag:
    description: Parsed tag name from GITHUB_REF (if applicable)
    value: ${{ steps.parse-ref.outputs.tag }}
  job-id:
    description: The workflow job id
    value: ${{ steps.get-job-id.outputs.job-id }}
  job-name:
    description: The workflow job name
    value: ${{ steps.get-job-id.outputs.job-name }}

runs:
  using: composite
  steps:
    # ── Common steps (shared) ────────────────────────────────────────
    - name: Ack Git cache ownership
      if: ${{ inputs.use-arc == 'true' }}
      shell: bash
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Checkout PyTorch
      uses: pytorch/pytorch/.github/actions/checkout-pytorch@main
      with:
        no-sudo: true
        checkout-mode: treeless
        submodules: ${{ inputs.submodules }}

    - name: Parse ref
      id: parse-ref
      shell: bash
      run: |
        if [ -f "${{ github.action_path }}/../../scripts/parse_ref.py" ]; then
          python3 "${{ github.action_path }}/../../scripts/parse_ref.py"
        elif [ -f .github/scripts/parse_ref.py ]; then
          python3 .github/scripts/parse_ref.py
        else
          echo "ERROR: parse_ref.py not found" >&2
          exit 1
        fi

    - name: Get workflow job id
      id: get-job-id
      if: ${{ always() && inputs.github-token != '' }}
      uses: pytorch/pytorch/.github/actions/get-workflow-job-id@main
      with:
        github-token: ${{ inputs.github-token }}

    # ── EC2-only steps ──────────────────────────────────────────────────
    - name: Display EC2 information
      if: ${{ inputs.use-arc != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        function get_ec2_metadata() {
          # Pulled from instance metadata endpoint for EC2
          # see https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instancedata-data-retrieval.html
          category=$1
          # If it is GCP runner (runner name contains gcp), do not run this
          runner_name_str=${{ runner.name }}
          if [[ -f /.inarc ]]; then
            echo "ARC Runner, no info on ec2 metadata"
          elif [[ $runner_name_str == *"gcp"* || $runner_name_str == *"google"* ]]; then
            echo "Runner is from Google Cloud Platform, No info on ec2 metadata"
          else
            curl -H "X-aws-ec2-metadata-token: $(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 30")" -fsSL "http://169.254.169.254/latest/meta-data/${category}"
          fi
        }
        echo "ami-id: $(get_ec2_metadata ami-id)"
        echo "instance-id: $(get_ec2_metadata instance-id)"
        echo "instance-type: $(get_ec2_metadata instance-type)"
        echo "system info $(uname -a)"

    - name: Check if in a container runner
      if: ${{ inputs.use-arc != 'true' }}
      shell: bash
      id: check_container_runner
      run: echo "IN_CONTAINER_RUNNER=$(if [ -f /.inarc ] || [ -f /.incontainer ]; then echo true ; else echo false; fi)" >> "$GITHUB_OUTPUT"

    - name: Start docker if docker daemon is not running
      shell: bash
      if: ${{ steps.check_container_runner.outputs.IN_CONTAINER_RUNNER == 'false' }}
      run: |
        if ! docker version >/dev/null 2>/dev/null; then
          if systemctl is-active --quiet docker; then
              echo "Docker daemon is running...";
          else
              echo "Starting docker daemon..." && sudo systemctl start docker;
          fi
        fi

    - name: Install uv (EC2)
      uses: pytorch/test-infra/.github/actions/setup-uv@main
      if: ${{ steps.check_container_runner.outputs.IN_CONTAINER_RUNNER == 'false' }}
      with:
        python-version: "3.12"

    - name: Install pip
      shell: bash
      if: ${{ steps.check_container_runner.outputs.IN_CONTAINER_RUNNER == 'false' }}
      run: |
        set -euo pipefail
        if command -v pip3 &> /dev/null; then
          echo "pip3 is already installed."
        else
          echo "pip3 not found, installing..."
          uv tool install pip
        fi

    - name: Kill any existing containers, clean up images
      if: ${{ steps.check_container_runner.outputs.IN_CONTAINER_RUNNER == 'false' }}
      shell: bash
      run: |
        # ignore expansion of "docker ps -q" since it could be empty
        # shellcheck disable=SC2046
        docker stop $(docker ps -q) || true
        # Prune all of the docker images
        docker system prune -af

    - name: Check that the docker daemon is running
      shell: bash
      continue-on-error: true
      if: ${{ steps.check_container_runner.outputs.IN_CONTAINER_RUNNER == 'true' }}
      run: |
        set +x

        max_attempts=30
        delay=10
        attempt=1

        for attempt in $(seq 1 $max_attempts); do
          echo "Attempt $attempt of $max_attempts: Checking if Docker daemon is running..."
          if docker info > /dev/null 2>&1; then
            echo "Docker is running. Proceeding with the next steps"
            exit 0
          else
            echo "Docker is not running yet."
            echo "Retrying in $delay seconds..."
            sleep $delay
          fi
        done
        echo "Reached maximum attempts to connect to Docker. Exiting."
        exit 1

    # ── ARC-only steps ──────────────────────────────────────────────────
    - name: Install uv (ARC)
      if: ${{ inputs.use-arc == 'true' }}
      uses: pytorch/test-infra/.github/actions/setup-uv@main
      with:
        python-version: ${{ inputs.python-version || '3.12' }}
        activate-environment: true

    - name: Install CI requirements
      if: ${{ inputs.use-arc == 'true' }}
      shell: bash
      run: |
        # Limit uv parallelism to avoid OOM on memory-constrained pods where
        # uv defaults to the host CPU count (e.g., 192) instead of the pod
        # limit. Can be removed once uv pip cache is ready
        export UV_CONCURRENT_BUILDS=1
        uv pip install -r .ci/docker/requirements-ci.txt
        echo "CMAKE_PREFIX_PATH=${VIRTUAL_ENV}" >> "${GITHUB_ENV}"

    - name: Activate C++ compiler
      if: ${{ inputs.use-arc == 'true' && inputs.compiler != '' }}
      shell: bash
      run: |
        set -eux

        COMPILER="${{ inputs.compiler }}"
        CLANG_VERSION=$(echo "${COMPILER}" | perl -n -e'/^clang(\d+)$/ && print $1')
        GCC_VERSION=$(echo "${COMPILER}" | perl -n -e'/^gcc(\d+)$/ && print $1')

        # Strip any gcc-toolset paths that might linger from the base image
        CLEAN_PATH=$(echo "${PATH}" | tr ':' '\n' | grep -v '/opt/rh/gcc-toolset-' | tr '\n' ':' | sed 's/:$//')
        CLEAN_LD_PATH=$(echo "${LD_LIBRARY_PATH:-}" | tr ':' '\n' | grep -v '/opt/rh/gcc-toolset-' | tr '\n' ':' | sed 's/:$//')

        if [ -z "${CLANG_VERSION}" ] && [ -z "${GCC_VERSION}" ]; then
          echo "ERROR: unrecognized compiler '${COMPILER}', expected gcc<N> or clang<N>"
          exit 1
        elif [ -n "${CLANG_VERSION}" ]; then
          # Clang versions are pre-installed in the base image under /opt/clang-{VERSION}.
          INSTALL_DIR="/opt/clang-${CLANG_VERSION}"
          if [ ! -d "${INSTALL_DIR}" ]; then
            echo "ERROR: clang ${CLANG_VERSION} not found at ${INSTALL_DIR}"
            exit 1
          fi
          echo "PATH=${INSTALL_DIR}/bin:${CLEAN_PATH}" >> "${GITHUB_ENV}"
          echo "LD_LIBRARY_PATH=${CLEAN_LD_PATH}" >> "${GITHUB_ENV}"
          echo "CC=${INSTALL_DIR}/bin/clang" >> "${GITHUB_ENV}"
          echo "CXX=${INSTALL_DIR}/bin/clang++" >> "${GITHUB_ENV}"
          echo "CMAKE_PREFIX_PATH=${INSTALL_DIR}:${CMAKE_PREFIX_PATH:-}" >> "${GITHUB_ENV}"
        else
          # All GCC versions are pre-installed in the base image via gcc-toolset
          # under /opt/rh/gcc-toolset-{VERSION}. Remove /usr/local/bin compiler
          # symlinks from the manylinux base image so they don't shadow the
          # toolset we're activating.
          rm -f /usr/local/bin/gcc /usr/local/bin/g++ /usr/local/bin/cc /usr/local/bin/c++
          TOOLSET_ROOT="/opt/rh/gcc-toolset-${GCC_VERSION}/root/usr"
          if [ ! -d "${TOOLSET_ROOT}" ]; then
            echo "ERROR: gcc-toolset-${GCC_VERSION} not found at ${TOOLSET_ROOT}"
            exit 1
          fi
          echo "PATH=${TOOLSET_ROOT}/bin:${CLEAN_PATH}" >> "${GITHUB_ENV}"
          echo "LD_LIBRARY_PATH=${TOOLSET_ROOT}/lib64:${TOOLSET_ROOT}/lib:${CLEAN_LD_PATH}" >> "${GITHUB_ENV}"
        fi

    - name: Switch CUDA version
      if: ${{ inputs.use-arc == 'true' && inputs.cuda-version != '' }}
      shell: bash
      run: |
        set -eux

        CUDA_VERSION="${{ inputs.cuda-version }}"

        # All CUDA versions are pre-installed in the base image under
        # /usr/local/cuda-{major.minor}. The default (/usr/local/cuda
        # symlink) points to CUDA 13. Switch to the requested version.
        CUDA_DIR="/usr/local/cuda-${CUDA_VERSION}"
        if [ ! -d "${CUDA_DIR}" ]; then
          echo "ERROR: CUDA ${CUDA_VERSION} not found at ${CUDA_DIR}"
          ls -d /usr/local/cuda-* /usr/local/cuda 2>/dev/null || true
          exit 1
        fi

        rm -f /usr/local/cuda
        ln -s "${CUDA_DIR}" /usr/local/cuda

        echo "PATH=/usr/local/cuda/bin:${PATH}" >> "${GITHUB_ENV}"
        echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"
        echo "CUDA_HOME=/usr/local/cuda" >> "${GITHUB_ENV}"
        echo "CUDA_PATH=/usr/local/cuda" >> "${GITHUB_ENV}"
        echo "DESIRED_CUDA=${CUDA_VERSION}" >> "${GITHUB_ENV}"
        echo "NCCL_INCLUDE_DIR=/usr/local/cuda/include" >> "${GITHUB_ENV}"
        echo "NCCL_LIB_DIR=/usr/local/cuda/lib64" >> "${GITHUB_ENV}"

        echo "Switched to CUDA ${CUDA_VERSION}"
        nvcc --version

    # ── Shared steps ────────────────────────────────────────────────────
    - name: Print GPU info (if present)
      shell: bash
      run: if [ -f /usr/bin/nvidia-smi ]; then nvidia-smi; fi

    - name: Preserve github env variables for use in docker
      shell: bash
      run: |
        env | grep '^GITHUB' >> "/tmp/github_env_${GITHUB_RUN_ID}"
        env | grep '^CI' >> "/tmp/github_env_${GITHUB_RUN_ID}"
