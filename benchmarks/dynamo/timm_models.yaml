# removing this file prevents the TimmRunner from dynamically skipping models
skip:
  all:
    - ~
  device:
    cpu:
      - ~
    # Skip these additional models when running on aarch64
    cpu_aarch64:
      # timeout on aarch64
      - dm_nfnet_f0
      - nfnet_l0
      - visformer_small


# TODO - Figure out the reason of cold start memory spike
batch_size:
  divisors:
    beit_base_patch16_224: 2
    deit_base_distilled_patch16_224: 2
    gluon_xception65: 2
    mobilevit_s: 2
    swin_base_patch4_window7_224: 2


tolerance:
  higher_training:
    - inception_v3
    - mobilenetv3_large_100

  higher_fp16_xpu:
    - botnet26t_256

  higher_amp: []

  even_higher:
    - deit_base_distilled_patch16_224
    - vit_base_patch16_siglip_256

  # These models need higher tolerance in MaxAutotune mode
  even_higher_max_autotune: []

  # beit_base_patch16_224 needs 16 * 1e-2 tolerance in training
  highest_training:
    - beit_base_patch16_224

  freezing:
    # the conv-batchnorm fusion used under freezing may cause relatively
    # large numerical difference. We need a larger tolerance.
    # Check https://github.com/pytorch/pytorch/issues/120545 for context
    - adv_inception_v3

  cosine: []


scaled_compute_loss:
  - mobilevit_s


require_larger_multiplier_for_smaller_tensor:
  - inception_v3
  - mobilenetv3_large_100
  - vit_base_patch14_dinov2.lvd142m


dtype:
  force_amp_for_fp16_bf16_models: []


accuracy:
  skip:
    eager_not_deterministic: []
